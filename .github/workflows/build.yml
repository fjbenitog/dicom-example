# This workflow will build a .NET project using GitHub Actions
# For more information see: https://docs.github.com/en/actions/guides/building-and-testing-net

name: Dicom Example Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore dicom-example.sln

    - name: Build
      run: dotnet build dicom-example.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test dicom-example.sln --no-build --verbosity normal
      continue-on-error: true
