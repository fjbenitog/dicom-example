# This workflow will build a .NET project using GitHub Actions
# For more information see: https://docs.github.com/en/actions/guides/building-and-testing-net

name: Dicom Example Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore dicom-example.sln

    - name: Install Nerdbank.GitVersioning
      run: dotnet tool restore || dotnet tool install --local nbgv

    - name: Set version from Git
      run: dotnet nbgv cloud

    - name: Build
      run: dotnet build dicom-example.sln --configuration Release --no-restore

    - name: Upload Esavi DLL
      uses: actions/upload-artifact@v4
      with:
        name: Esavi-DLL
        path: ./src/Esavi/Esavi/bin/Release/**/*.dll

    - name: Test
      run: |
        dotnet test dicom-example.sln --verbosity normal --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1


    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate HTML Test Report
      run: |
        dotnet reportgenerator -reports:./TestResults/*.trx -targetdir:./TestResults/html -reporttypes:Html

    - name: Upload HTML Test Report
      uses: actions/upload-artifact@v4
      with:
        name: html-test-report
        path: ./TestResults/html
      if: always()
      
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./TestResults/*.trx
      if: always()
