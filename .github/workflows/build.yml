# This workflow will build a .NET project using GitHub Actions
# For more information see: https://docs.github.com/en/actions/guides/building-and-testing-net

name: Dicom Example Build
permissions:
  checks: write
  pull-requests: write
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore dicom-example.sln

    - name: Install Nerdbank.GitVersioning
      run: dotnet tool restore || dotnet tool install --local nbgv

    - name: Set version from Git
      run: dotnet nbgv cloud

    - name: Build
      run: dotnet build dicom-example.sln --configuration Release --no-restore

    - name: List Esavi bin contents
      run: |
        Write-Host "Release bin contents:"
        Get-ChildItem -Path ./src/Esavi/Esavi/bin/Release -Recurse -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
        Write-Host "Debug bin contents:"
        Get-ChildItem -Path ./src/Esavi/Esavi/bin/Debug -Recurse -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
      shell: pwsh

    - name: Upload Esavi DLL
      uses: actions/upload-artifact@v4
      with:
        name: Esavi-DLL
        path: |
          ./src/Esavi/Esavi/bin/Release/**/*.dll
          ./src/Esavi/Esavi/bin/Debug/**/*.dll

    - name: Test
      run: |
        dotnet test dicom-example.sln --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

    - name: Publish Test Results to Summary
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: .NET Tests
        path: ./TestResults/*.trx
        reporter: dotnet-trx
