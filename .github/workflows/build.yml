# This workflow will build a .NET project using GitHub Actions
# For more information see: https://docs.github.com/en/actions/guides/building-and-testing-net

name: Dicom Example Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore dicom-example.sln

    - name: Build
      run: dotnet build dicom-example.sln --configuration Release --no-restore

    - name: List test projects
      run: |
        echo "Listing test projects:"
        find . -type f -name "*.csproj" | grep -i test || true

    - name: Test
      run: |
        set -e
        dotnet test dicom-example.sln --no-build --verbosity normal
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
