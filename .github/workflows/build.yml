# This workflow will build a .NET project using GitHub Actions
# For more information see: https://docs.github.com/en/actions/guides/building-and-testing-net

name: Dicom Example Build
permissions:
  checks: write
  pull-requests: write
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore dicom-example.sln

    - name: Install Nerdbank.GitVersioning
      run: dotnet tool restore || dotnet tool install --local nbgv

    - name: Set version from Git
      run: dotnet nbgv cloud

    - name: Build
      run: dotnet build dicom-example.sln --configuration Release --no-restore

    - name: Rename Esavi DLL with version and commit
      run: |
        $nbgv = dotnet nbgv get-version --format json | ConvertFrom-Json
        $version = $nbgv.NuGetPackageVersion
        $commit = $nbgv.GitCommitId
        $src = "./src/Esavi/bin/Release/net8.0-windows7.0/Esavi.dll"
        $dst = "./src/Esavi/bin/Release/net8.0-windows7.0/Esavi-$version-$commit.dll"
        if (Test-Path $src) { Move-Item $src $dst }
      shell: pwsh

    - name: Upload Esavi DLL
      uses: actions/upload-artifact@v4
      with:
        name: Esavi-DLL
        path: ./src/Esavi/bin/Release/net8.0-windows7.0/Esavi-*.dll

    - name: Test
      run: |
        dotnet test dicom-example.sln --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

    - name: Publish Test Results to Summary
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results Report
        path: ./TestResults/*.trx
        reporter: dotnet-trx
