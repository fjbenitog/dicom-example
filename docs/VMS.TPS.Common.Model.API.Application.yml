- uid: VMS.TPS.Common.Model.API.Application.CreateApplication(System.String,System.String)
  commentId: M:VMS.TPS.Common.Model.API.Application.CreateApplication(System.String,System.String)
  id: CreateApplication(System.String,System.String)
  parent: VMS.TPS.Common.Model.API.Application
  langs:
  - csharp
  - vb
  name: CreateApplication(string, string)
  nameWithType: Application.CreateApplication(string, string)
  fullName: VMS.TPS.Common.Model.API.Application.CreateApplication(string, string)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: Creates an application instance and logs into the system.
  remarks: >-
    Code that uses ESAPI must run on a single-threaded apartment

    (STAThread). Dispose must be called before the program exits. Only

    one Application instance may be created during the entire run of the

    program.
  example: []
  syntax:
    content: >-
      [Obsolete("Eclipse Scripting API Application executes using the currently logged in Windows user credentials. The given username and password are ignored.")]

      public static Application CreateApplication(string username, string password)
    parameters:
    - id: username
      type: System.String
      description: Username for logging in or null value to invoke an interactive login dialog.
    - id: password
      type: System.String
      description: Password for logging in or null value to invoke an interactive login dialog.
    return:
      type: VMS.TPS.Common.Model.API.Application
      description: Application object that is the root of the data model.
    content.vb: >-
      <Obsolete("Eclipse Scripting API Application executes using the currently logged in Windows user credentials. The given username and password are ignored.")>

      Public Shared Function CreateApplication(username As String, password As String) As Application
  overload: VMS.TPS.Common.Model.API.Application.CreateApplication*
  attributes:
  - type: System.ObsoleteAttribute
    ctor: System.ObsoleteAttribute.#ctor(System.String)
    arguments:
    - type: System.String
      value: Eclipse Scripting API Application executes using the currently logged in Windows user credentials. The given username and password are ignored.
  nameWithType.vb: Application.CreateApplication(String, String)
  fullName.vb: VMS.TPS.Common.Model.API.Application.CreateApplication(String, String)
  name.vb: CreateApplication(String, String)
