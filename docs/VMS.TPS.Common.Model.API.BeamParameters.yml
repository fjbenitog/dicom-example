- uid: VMS.TPS.Common.Model.API.BeamParameters.WeightFactor
  commentId: P:VMS.TPS.Common.Model.API.BeamParameters.WeightFactor
  id: WeightFactor
  parent: VMS.TPS.Common.Model.API.BeamParameters
  langs:
  - csharp
  - vb
  name: WeightFactor
  nameWithType: BeamParameters.WeightFactor
  fullName: VMS.TPS.Common.Model.API.BeamParameters.WeightFactor
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: The weight factor of the beam.
  remarks: >-
    The total dose distribution of a plan is calculated by adding the individual beam dose

    distributions. Before doing this, the dose distributions of each beam are multiplied

    with the respective beam weights, which indicate the relative weight of each beam in

    a plan. How the weight factors affect the dose distribution is determined by the

    selected beam normalization method.
  example: []
  syntax:
    content: public double WeightFactor { get; set; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public Property WeightFactor As Double
  overload: VMS.TPS.Common.Model.API.BeamParameters.WeightFactor*
