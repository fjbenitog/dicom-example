- uid: VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions(System.Single[0:,0:])
  commentId: M:VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions(System.Single[0:,0:])
  id: SetAllLeafPositions(System.Single[0:,0:])
  parent: VMS.TPS.Common.Model.API.BeamParameters
  langs:
  - csharp
  - vb
  name: SetAllLeafPositions(float[,])
  nameWithType: BeamParameters.SetAllLeafPositions(float[,])
  fullName: VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions(float[,])
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: Assigns the given leaf positions to each of the control point parameters.
  remarks: >-
    To apply the parameters, call the <xref href="VMS.TPS.Common.Model.API.Beam.ApplyParameters(VMS.TPS.Common.Model.API.BeamParameters)?text=ApplyParameters" data-throw-if-not-resolved="false"></xref>
                method of the Beam class.
  example: []
  syntax:
    content: public void SetAllLeafPositions(float[,] leafPositions)
    parameters:
    - id: leafPositions
      type: System.Single[,]
      description: >-
        The positions of the MLC leaf pairs (in millimeters) in the IEC BEAMLIMITING DEVICE

        coordinate axis appropriate to the MLC device type: the X-axis for MLCX and the Y-axis for MLCY.

        The two-dimensional array is indexed [bank, leaf], where the bank is either 0 or 1.

        Bank 0 represents the leaf bank to the negative MLC X direction, and bank 1 to the positive MLC X direction.
    content.vb: Public Sub SetAllLeafPositions(leafPositions As Single(,))
  overload: VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions*
  nameWithType.vb: BeamParameters.SetAllLeafPositions(Single(,))
  fullName.vb: VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions(Single(,))
  name.vb: SetAllLeafPositions(Single(,))
