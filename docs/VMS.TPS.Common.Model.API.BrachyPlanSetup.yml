    - id: keepDoseIntact
      type: System.Boolean
      description: If true, the dwell times are scaled to keep the dose intact. If false, dwell times are not scaled, and the dose may be invalidated.
    - id: messages
      type: System.Collections.Generic.List{System.String}
      description: An output parameter that may be populated with 1..n messages of additional information.
    return:
      type: VMS.TPS.Common.Model.Types.ChangeBrachyTreatmentUnitResult
      description: >-
        ChangeBrachyTreatmentUnitResult.Success if the brachy treatment unit was successfully changed.
                    ChangeBrachyTreatmentUnitResult.SuccessButPdrDataMissing if the brachy treatment unit was changed, but the plan does not have valid PDR (Pulse Dose Rate) data.
                    ChangeBrachyTreatmentUnitResult.Failed if the brachy treatment unit change failed.
                    ChangeBrachyTreatmentUnitResult.FailedBecausePlanContainsSeedCollections if the treatment unit could not be changed because the plan contains seed collection(s).
    content.vb: Public Function ChangeTreatmentUnit(treatmentUnit As BrachyTreatmentUnit, keepDoseIntact As Boolean, messages As List(Of String)) As ChangeBrachyTreatmentUnitResult
