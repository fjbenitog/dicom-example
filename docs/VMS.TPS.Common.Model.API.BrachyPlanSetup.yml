- uid: VMS.TPS.Common.Model.API.BrachyPlanSetup.CalculateAccurateTG43DoseProfile(VMS.TPS.Common.Model.Types.VVector,VMS.TPS.Common.Model.Types.VVector,System.Double[])
  commentId: M:VMS.TPS.Common.Model.API.BrachyPlanSetup.CalculateAccurateTG43DoseProfile(VMS.TPS.Common.Model.Types.VVector,VMS.TPS.Common.Model.Types.VVector,System.Double[])
  id: CalculateAccurateTG43DoseProfile(VMS.TPS.Common.Model.Types.VVector,VMS.TPS.Common.Model.Types.VVector,System.Double[])
  parent: VMS.TPS.Common.Model.API.BrachyPlanSetup
  langs:
  - csharp
  - vb
  name: CalculateAccurateTG43DoseProfile(VVector, VVector, double[])
  nameWithType: BrachyPlanSetup.CalculateAccurateTG43DoseProfile(VVector, VVector, double[])
  fullName: VMS.TPS.Common.Model.API.BrachyPlanSetup.CalculateAccurateTG43DoseProfile(VMS.TPS.Common.Model.Types.VVector, VMS.TPS.Common.Model.Types.VVector, double[])
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: Calculates and returns the dose profile. Profile is calculated on the fly with TG-43 formalism.
  example: []
  syntax:
    content: public DoseProfile CalculateAccurateTG43DoseProfile(VVector start, VVector stop, double[] preallocatedBuffer)
    parameters:
    - id: start
      type: VMS.TPS.Common.Model.Types.VVector
      description: Location of the first point of the profile.
    - id: stop
      type: VMS.TPS.Common.Model.Types.VVector
      description: Location of the last point of the profile.
    - id: preallocatedBuffer
      type: System.Double[]
      description: >-
        Preallocated buffer where the values are stored. The size of
                    the buffer determines the number of values to return.
    return:
      type: VMS.TPS.Common.Model.Types.DoseProfile
      description: >-
        Dose profile that holds the dose values along the line segment defined by the start and stop parameters.
                    Values are NaN if the plan has imported dose or the dose has been calculated with the AcurosBV algorithm.
    content.vb: Public Function CalculateAccurateTG43DoseProfile(start As VVector, [stop] As VVector, preallocatedBuffer As Double()) As DoseProfile
  overload: VMS.TPS.Common.Model.API.BrachyPlanSetup.CalculateAccurateTG43DoseProfile*
