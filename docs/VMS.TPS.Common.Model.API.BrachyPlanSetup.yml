  summary: '[Availability of this method depends on your Eclipse Scripting API license] Creates a new brachyterapy applicator to the plan.'
  example: []
  syntax:
    content: public Catheter AddCatheter(string catheterId, BrachyTreatmentUnit treatmentUnit, StringBuilder outputDiagnostics, bool appendChannelNumToId, int channelNum)
    parameters:
    - id: catheterId
      type: System.String
      description: Id of the catheter.
    - id: treatmentUnit
      type: VMS.TPS.Common.Model.API.BrachyTreatmentUnit
      description: The <xref href="VMS.TPS.Common.Model.API.BrachyTreatmentUnit?text=brachytherapy+treatment+unit" data-throw-if-not-resolved="false"></xref> to be set to the applicator.
    - id: outputDiagnostics
      type: System.Text.StringBuilder
      description: Additional information about brachytherapy applicator creation.
    - id: appendChannelNumToId
      type: System.Boolean
      description: If true, channel number will be appended to the given catheterId.
    - id: channelNum
      type: System.Int32
      description: Channel number of the catheter. 0 assigns next available free channel number. -1 assigns empty channel number.
    return:
      type: VMS.TPS.Common.Model.API.Catheter
      description: Newly created brachytherapy applicator.
