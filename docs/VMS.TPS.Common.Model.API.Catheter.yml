  name: Catheter
  nameWithType: Catheter
  fullName: VMS.TPS.Common.Model.API.Catheter
  type: Class
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Represents a brachytherapy catheter or an applicator channel centerline. Catheters are associated with a <xref href="VMS.TPS.Common.Model.API.BrachyTreatmentUnit?text=brachytherapy+treatment+unit" data-throw-if-not-resolved="false"></xref>,

    a <xref href="VMS.TPS.Common.Model.API.Catheter.ChannelNumber?text=+channel+number" data-throw-if-not-resolved="false"></xref>, and possibly a <xref href="VMS.TPS.Common.Model.API.Catheter.BrachySolidApplicatorPartID?text=unique+identifier" data-throw-if-not-resolved="false"></xref>

    of the <xref href="VMS.TPS.Common.Model.API.BrachySolidApplicator?text=solid+applicator+part" data-throw-if-not-resolved="false"></xref> they belong to. Most notably, catheters encapsulate the <xref href="VMS.TPS.Common.Model.API.Catheter.Shape?text=shape" data-throw-if-not-resolved="false"></xref>

    of the applicator channel centerline and its <xref href="VMS.TPS.Common.Model.API.Catheter.SourcePositions?text=source+positions" data-throw-if-not-resolved="false"></xref>.
  example: []
