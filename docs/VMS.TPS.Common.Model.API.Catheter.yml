- uid: VMS.TPS.Common.Model.API.Catheter.GetSourcePosCenterDistanceFromTip(VMS.TPS.Common.Model.API.SourcePosition)
  commentId: M:VMS.TPS.Common.Model.API.Catheter.GetSourcePosCenterDistanceFromTip(VMS.TPS.Common.Model.API.SourcePosition)
  id: GetSourcePosCenterDistanceFromTip(VMS.TPS.Common.Model.API.SourcePosition)
  parent: VMS.TPS.Common.Model.API.Catheter
  langs:
  - csharp
  - vb
  name: GetSourcePosCenterDistanceFromTip(SourcePosition)
  nameWithType: Catheter.GetSourcePosCenterDistanceFromTip(SourcePosition)
  fullName: VMS.TPS.Common.Model.API.Catheter.GetSourcePosCenterDistanceFromTip(VMS.TPS.Common.Model.API.SourcePosition)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The distance (in millimeters) from the tip of the catheter (in the first possible source position) to the center of the source position.

    This is an offset from the actual catheter inner lumen tip by half of the source length and encapsulation.
  example: []
  syntax:
    content: public double GetSourcePosCenterDistanceFromTip(SourcePosition sourcePosition)
    parameters:
    - id: sourcePosition
      type: VMS.TPS.Common.Model.API.SourcePosition
      description: The source position for which the distance from the catheter tip is got.
    return:
      type: System.Double
      description: The distance from the tip of the catheter to the source position center, in millimeters.
    content.vb: Public Function GetSourcePosCenterDistanceFromTip(sourcePosition As SourcePosition) As Double
  overload: VMS.TPS.Common.Model.API.Catheter.GetSourcePosCenterDistanceFromTip*
