- uid: VMS.TPS.Common.Model.API.ControlPoint.JawPositions
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.JawPositions
  id: JawPositions
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
  - vb
  name: JawPositions
  nameWithType: ControlPoint.JawPositions
  fullName: VMS.TPS.Common.Model.API.ControlPoint.JawPositions
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The positions of the beam collimator jaws (in mm) in the IEC BEAM LIMITING DEVICE

    coordinates.
  remarks: >-
    The definition is adapted from DICOM PS 3.3 C.8.8.14

    "Leaf/Jaw Positions". The difference is that DICOM likens the

    collimator jaw positions with MLC leaf positions and places

    them in the same sequence.
  example: []
  syntax:
    content: public VRect<double> JawPositions { get; }
    parameters: []
    return:
      type: VMS.TPS.Common.Model.Types.VRect{System.Double}
    content.vb: Public ReadOnly Property JawPositions As VRect(Of Double)
  overload: VMS.TPS.Common.Model.API.ControlPoint.JawPositions*
- uid: VMS.TPS.Common.Model.API.ControlPoint.LeafPositions
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.LeafPositions
  id: LeafPositions
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
  - vb
  name: LeafPositions
  nameWithType: ControlPoint.LeafPositions
  fullName: VMS.TPS.Common.Model.API.ControlPoint.LeafPositions
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The positions of the beam collimator leaf pairs (in mm) in the IEC BEAMLIMITING

    DEVICE coordinate axis appropriate to the device type. For example, the X-axis

    for MLCX and the Y-axis for MLCY. The two-dimensional array is

    indexed [bank, leaf] where the bank is either 0 or 1. Bank 0 represents

    the leaf bank to the negative MLC X direction, and bank 1 to the

    positive MLC X direction. If there is no MLC, a (0,0)-length array is

    returned.
  remarks: >-
    The definition is adapted from DICOM PS 3.3 C.8.8.14

    "Leaf/Jaw Positions". The difference is that DICOM supports a

    position sequence for each collimator type while we support a position

    sequence for a single MLC plus four jaws.
  example: []
  syntax:
    content: public float[,] LeafPositions { get; }
    parameters: []
    return:
      type: System.Single[,]
    content.vb: Public ReadOnly Property LeafPositions As Single(,)
  overload: VMS.TPS.Common.Model.API.ControlPoint.LeafPositions*
- uid: VMS.TPS.Common.Model.API.ControlPoint.MetersetWeight
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.MetersetWeight
  id: MetersetWeight
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
  - vb
  name: MetersetWeight
  nameWithType: ControlPoint.MetersetWeight
  fullName: VMS.TPS.Common.Model.API.ControlPoint.MetersetWeight
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The cumulative meterset weight to this control point. The cumulative meterset

    weight for the first item in a control point sequence is zero.
  remarks: >-
    The meterset at a given control point is equal to the beam meterset,

    multiplied by the cumulative meterset weight for the control point,

    divided by the final cumulative meterset weight.

    The definition is adapted from DICOM PS 3.3 C.8.8.14.
  example: []
  syntax:
    content: public double MetersetWeight { get; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public ReadOnly Property MetersetWeight As Double
  overload: VMS.TPS.Common.Model.API.ControlPoint.MetersetWeight*
- uid: VMS.TPS.Common.Model.API.ControlPoint.PatientSupportAngle
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.PatientSupportAngle
  id: PatientSupportAngle
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
  - vb
  name: PatientSupportAngle
  nameWithType: ControlPoint.PatientSupportAngle
  fullName: VMS.TPS.Common.Model.API.ControlPoint.PatientSupportAngle
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The patient support angle. In other words, the orientation of the IEC PATIENT SUPPORT

    (turntable) coordinate system with respect to the IEC FIXED REFERENCE

    coordinate system (in degrees).
  remarks: >-
    The definition is from DICOM PS 3.3 C.8.8.14 "Patient Support Angle",

    but here rotation direction is specified implicitly towards the

    shortest angle between the current and the next control point.
  example: []
  syntax:
    content: public double PatientSupportAngle { get; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public ReadOnly Property PatientSupportAngle As Double
  overload: VMS.TPS.Common.Model.API.ControlPoint.PatientSupportAngle*
