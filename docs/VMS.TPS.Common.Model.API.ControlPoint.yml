- uid: VMS.TPS.Common.Model.API.ControlPoint.CollimatorAngle
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.CollimatorAngle
  id: CollimatorAngle
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
  - vb
  name: CollimatorAngle
  nameWithType: ControlPoint.CollimatorAngle
  fullName: VMS.TPS.Common.Model.API.ControlPoint.CollimatorAngle
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The orientation of the IEC BEAM LIMITING DEVICE coordinate system with

    respect to the IEC GANTRY coordinate system (in degrees).
  remarks: >-
    The definition is adapted from DICOM PS 3.3 C.8.8.14

    "Beam Limiting Device Angle", but rotation direction is

    not specified explicitly.
  example: []
  syntax:
    content: public double CollimatorAngle { get; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public ReadOnly Property CollimatorAngle As Double
  overload: VMS.TPS.Common.Model.API.ControlPoint.CollimatorAngle*
- uid: VMS.TPS.Common.Model.API.ControlPoint.GantryAngle
  commentId: P:VMS.TPS.Common.Model.API.ControlPoint.GantryAngle
  id: GantryAngle
  parent: VMS.TPS.Common.Model.API.ControlPoint
  langs:
  - csharp
