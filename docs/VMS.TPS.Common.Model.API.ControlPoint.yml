  nameWithType: ControlPoint.GantryAngle
  fullName: VMS.TPS.Common.Model.API.ControlPoint.GantryAngle
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    The gantry angle of the radiation source. In other words, the orientation of the IEC GANTRY

    coordinate system with respect to the IEC FIXED REFERENCE coordinate

    system (in degrees).
  remarks: >-
    The definition is from DICOM PS 3.3 C.8.8.14 "Gantry Angle", but

    rotation direction does not change during treatment and it is

    specified in Beam.GantryDirection instead.
  example: []
  syntax:
    content: public double GantryAngle { get; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public ReadOnly Property GantryAngle As Double
  overload: VMS.TPS.Common.Model.API.ControlPoint.GantryAngle*
