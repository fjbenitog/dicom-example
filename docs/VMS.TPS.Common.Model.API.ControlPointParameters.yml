- uid: VMS.TPS.Common.Model.API.ControlPointParameters.JawPositions
  commentId: P:VMS.TPS.Common.Model.API.ControlPointParameters.JawPositions
  id: JawPositions
  parent: VMS.TPS.Common.Model.API.ControlPointParameters
  langs:
  - csharp
  - vb
  name: JawPositions
  nameWithType: ControlPointParameters.JawPositions
  fullName: VMS.TPS.Common.Model.API.ControlPointParameters.JawPositions
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    A copy of the jaw positions of the treatment beams at this control point in millimeters, and

    in IEC BEAM LIMITING DEVICE coordinates.
  remarks: >-
    To set the same leaf positions for all control points (as is required if you
                use a static beam), use the
                <xref href="VMS.TPS.Common.Model.API.BeamParameters.SetJawPositions(VMS.TPS.Common.Model.Types.VRect%7bSystem.Double%7d)?text=SetJawPositions" data-throw-if-not-resolved="false"></xref>
                method in BeamParameters.
  example: []
  syntax:
    content: public VRect<double> JawPositions { get; set; }
    parameters: []
    return:
      type: VMS.TPS.Common.Model.Types.VRect{System.Double}
    content.vb: Public Property JawPositions As VRect(Of Double)
  overload: VMS.TPS.Common.Model.API.ControlPointParameters.JawPositions*
- uid: VMS.TPS.Common.Model.API.ControlPointParameters.LeafPositions
  commentId: P:VMS.TPS.Common.Model.API.ControlPointParameters.LeafPositions
  id: LeafPositions
  parent: VMS.TPS.Common.Model.API.ControlPointParameters
  langs:
  - csharp
  - vb
  name: LeafPositions
  nameWithType: ControlPointParameters.LeafPositions
  fullName: VMS.TPS.Common.Model.API.ControlPointParameters.LeafPositions
  type: Property
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    A copy of the positions of the MLC leaf pairs (in millimeters) in the IEC BEAMLIMITING

    DEVICE coordinate axis appropriate to the MLC device type: the X-axis

    for MLCX and the Y-axis for MLCY. The two-dimensional array is

    indexed [bank, leaf], where the bank is either 0 or 1. Bank 0 represents

    the leaf bank to the negative MLC X direction, and bank 1 to the

    positive MLC X direction. If no MLC exists, a (0,0)-length array is

    returned.
  remarks: >-
    To set the same leaf positions for all control points (as is required if you
                use a static MLC), use the
                <xref href="VMS.TPS.Common.Model.API.BeamParameters.SetAllLeafPositions(System.Single%5b0%3a%2c0%3a%5d)?text=SetAllLeafPositions" data-throw-if-not-resolved="false"></xref>
                method in BeamParameters.
  example: []
  syntax:
    content: public float[,] LeafPositions { get; set; }
    parameters: []
    return:
      type: System.Single[,]
    content.vb: Public Property LeafPositions As Single(,)
  overload: VMS.TPS.Common.Model.API.ControlPointParameters.LeafPositions*
