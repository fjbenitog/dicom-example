- uid: VMS.TPS.Common.Model.API.CustomScriptExecutable.CreateApplication(System.String)
  commentId: M:VMS.TPS.Common.Model.API.CustomScriptExecutable.CreateApplication(System.String)
  id: CreateApplication(System.String)
  parent: VMS.TPS.Common.Model.API.CustomScriptExecutable
  langs:
  - csharp
  - vb
  name: CreateApplication(string)
  nameWithType: CustomScriptExecutable.CreateApplication(string)
  fullName: VMS.TPS.Common.Model.API.CustomScriptExecutable.CreateApplication(string)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Creates an application object for a custom executable and logs it into the system.


    Application object created by this method can be used when the executable itself is not a script.

    For example, an interpreter of a high level programming language, or a native C++ application that integrates into .NET and uses ESAPI.


    The scripts executed with this application object are always read-only in a clinical environment,

    and writable in a non-clinical environment.
  remarks: >-
    Code that uses ESAPI must run on a single-threaded apartment (STAThread).

    The Dispose method must be called before the program exits.

    Only one application object may be created during the entire run of the program.
  example: []
  syntax:
    content: public static Application CreateApplication(string scriptName)
    parameters:
    - id: scriptName
      type: System.String
      description: The script name for logging in. Preferably use the full absolute path.
    return:
      type: VMS.TPS.Common.Model.API.Application
      description: Application object that is the root of the data model.
    content.vb: Public Shared Function CreateApplication(scriptName As String) As Application
