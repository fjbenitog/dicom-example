  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Creates an evaluation dose for the plan. The voxels in an evaluation dose

    can be set using the Eclipse Scripting API instead of a dose calculation algorithm.

    To create an evaluation dose, the plan must not contain any beams.

    To set the evaluation dose voxels, retrieve the dose matrix using the <xref href="VMS.TPS.Common.Model.API.ExternalPlanSetup.DoseAsEvaluationDose?text=DoseAsEvaluationDose" data-throw-if-not-resolved="false"></xref> property of the plan

    and then use <xref href="VMS.TPS.Common.Model.API.EvaluationDose.SetVoxels(System.Int32%2cSystem.Int32%5b0%3a%2c0%3a%5d)?text=SetVoxels" data-throw-if-not-resolved="false"></xref>.
  remarks: Saving modifications to the database is not possible if the evaluation dose has been created but voxels have not been set.
  example: []
  syntax:
    content: public EvaluationDose CreateEvaluationDose()
    return:
      type: VMS.TPS.Common.Model.API.EvaluationDose
      description: A new evaluation dose object.
