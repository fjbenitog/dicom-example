- uid: VMS.TPS.Common.Model.API.ExternalPlanSetup.CalculateDoseWithPresetValues(System.Collections.Generic.List{System.Collections.Generic.KeyValuePair{System.String,VMS.TPS.Common.Model.Types.MetersetValue}})
  commentId: M:VMS.TPS.Common.Model.API.ExternalPlanSetup.CalculateDoseWithPresetValues(System.Collections.Generic.List{System.Collections.Generic.KeyValuePair{System.String,VMS.TPS.Common.Model.Types.MetersetValue}})
  id: CalculateDoseWithPresetValues(System.Collections.Generic.List{System.Collections.Generic.KeyValuePair{System.String,VMS.TPS.Common.Model.Types.MetersetValue}})
  parent: VMS.TPS.Common.Model.API.ExternalPlanSetup
  langs:
  - csharp
  - vb
  name: CalculateDoseWithPresetValues(List<KeyValuePair<string, MetersetValue>>)
  nameWithType: ExternalPlanSetup.CalculateDoseWithPresetValues(List<KeyValuePair<string, MetersetValue>>)
  fullName: VMS.TPS.Common.Model.API.ExternalPlanSetup.CalculateDoseWithPresetValues(System.Collections.Generic.List<System.Collections.Generic.KeyValuePair<string, VMS.TPS.Common.Model.Types.MetersetValue>>)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Calculates the dose for the plan with preset meterset values.

    This applies only to IMRT beams.
  example: []
  syntax:
    content: public CalculationResult CalculateDoseWithPresetValues(List<KeyValuePair<string, MetersetValue>> presetValues)
    parameters:
    - id: presetValues
      type: System.Collections.Generic.List{System.Collections.Generic.KeyValuePair{System.String,VMS.TPS.Common.Model.Types.MetersetValue}}
      description: >-
        The list of preset meterset values for the beams. An element of the list should contain a pair consisting of the 
                    beam identifier (as the key) and the corresponding preset meterset value for the beam. 
                    Each beam in the plan must have one entry in the list.
    return:
      type: VMS.TPS.Common.Model.API.CalculationResult
      description: The calculation result. See calculation details from <xref href="VMS.TPS.Common.Model.API.Beam.CalculationLogs?text=the+calculation+logs" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Function CalculateDoseWithPresetValues(presetValues As List(Of KeyValuePair(Of String, MetersetValue))) As CalculationResult
  overload: VMS.TPS.Common.Model.API.ExternalPlanSetup.CalculateDoseWithPresetValues*
  nameWithType.vb: ExternalPlanSetup.CalculateDoseWithPresetValues(List(Of KeyValuePair(Of String, MetersetValue)))
  fullName.vb: VMS.TPS.Common.Model.API.ExternalPlanSetup.CalculateDoseWithPresetValues(System.Collections.Generic.List(Of System.Collections.Generic.KeyValuePair(Of String, VMS.TPS.Common.Model.Types.MetersetValue)))
