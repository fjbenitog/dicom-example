  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Sets the maximum number of the API calls that are saved in the script execution log.

    This will clear the existing log entries.
  example: []
  syntax:
    content: public static void SetMaximumNumberOfLoggedApiCalls(int apiLogCacheSize)
    parameters:
    - id: apiLogCacheSize
      type: System.Int32
      description: The cache size for API call logs. Setting the value to zero disables logging.
    content.vb: Public Shared Sub SetMaximumNumberOfLoggedApiCalls(apiLogCacheSize As Integer)
