  name: GetLoggedApiCalls()
  nameWithType: Globals.GetLoggedApiCalls()
  fullName: VMS.TPS.Common.Model.API.Globals.GetLoggedApiCalls()
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Returns the last called properties and methods. The oldest cached call is the first.

    The maximum number of logged calls is set by calling SetMaximumNumberOfLoggedApiCalls.
  example: []
  syntax:
    content: public static IEnumerable<string> GetLoggedApiCalls()
    return:
      type: System.Collections.Generic.IEnumerable{System.String}
      description: The called API properties and methods as saved in the cache.
    content.vb: Public Shared Function GetLoggedApiCalls() As IEnumerable(Of String)
