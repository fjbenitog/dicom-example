  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: '[Availability of this method depends on your Eclipse Scripting API license] Calculates DVH estimates for the plan.'
  example: []
  syntax:
    content: CalculationResult CalculateDVHEstimates(string modelId, Dictionary<string, DoseValue> targetDoseLevels, Dictionary<string, string> structureMatches)
    parameters:
    - id: modelId
      type: System.String
      description: DVH estimation model ID.
    - id: targetDoseLevels
      type: System.Collections.Generic.Dictionary{System.String,VMS.TPS.Common.Model.Types.DoseValue}
      description: Dose levels for the target structures.
    - id: structureMatches
      type: System.Collections.Generic.Dictionary{System.String,System.String}
      description: >-
        Matching between the IDs of the structures contained in the structure set used in the plan (the Key in the Dictionary)
                    and the structures used in the DVH estimation model (the Value in the Dictionary).
    return:
      type: VMS.TPS.Common.Model.API.CalculationResult
      description: The calculation result. See the calculation details <xref href="VMS.TPS.Common.Model.API.Beam.CalculationLogs?text=+in+the+calculation+logs" data-throw-if-not-resolved="false"></xref>
    content.vb: Function CalculateDVHEstimates(modelId As String, targetDoseLevels As Dictionary(Of String, DoseValue), structureMatches As Dictionary(Of String, String)) As CalculationResult
