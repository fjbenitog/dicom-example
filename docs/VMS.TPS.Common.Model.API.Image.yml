- uid: VMS.TPS.Common.Model.API.Image.CalculateDectProtonStoppingPowers(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image,System.Int32,System.Double[0:,0:])
  commentId: M:VMS.TPS.Common.Model.API.Image.CalculateDectProtonStoppingPowers(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image,System.Int32,System.Double[0:,0:])
  id: CalculateDectProtonStoppingPowers(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image,System.Int32,System.Double[0:,0:])
  parent: VMS.TPS.Common.Model.API.Image
  langs:
  - csharp
  - vb
  name: CalculateDectProtonStoppingPowers(Image, Image, int, double[,])
  nameWithType: Image.CalculateDectProtonStoppingPowers(Image, Image, int, double[,])
  fullName: VMS.TPS.Common.Model.API.Image.CalculateDectProtonStoppingPowers(VMS.TPS.Common.Model.API.Image, VMS.TPS.Common.Model.API.Image, int, double[,])
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Returns the voxel-wise DECT proton stopping powers of the given image plane calculated

    from the current image and the rho and Z images. The image FOR, size, and resolution for the rho and Z images must conform with this image.
  example: []
  syntax:
    content: public void CalculateDectProtonStoppingPowers(Image rhoImage, Image zImage, int planeIndex, double[,] preallocatedBuffer)
    parameters:
    - id: rhoImage
      type: VMS.TPS.Common.Model.API.Image
      description: A DECT relative electron density image. The electron density is interpreted from the image values as rho = 0.001 * (value + 1000).
    - id: zImage
      type: VMS.TPS.Common.Model.API.Image
      description: A DECT effective atomic number image.
    - id: planeIndex
      type: System.Int32
      description: Zero based index of the plane.
    - id: preallocatedBuffer
      type: System.Double[,]
      description: >-
        Pre-allocated buffer where the proton stopping power values
                    are stored. The size of the buffer must conform with the X- and Y-size of this image.
    content.vb: Public Sub CalculateDectProtonStoppingPowers(rhoImage As Image, zImage As Image, planeIndex As Integer, preallocatedBuffer As Double(,))
  overload: VMS.TPS.Common.Model.API.Image.CalculateDectProtonStoppingPowers*
  nameWithType.vb: Image.CalculateDectProtonStoppingPowers(Image, Image, Integer, Double(,))
  fullName.vb: VMS.TPS.Common.Model.API.Image.CalculateDectProtonStoppingPowers(VMS.TPS.Common.Model.API.Image, VMS.TPS.Common.Model.API.Image, Integer, Double(,))
  name.vb: CalculateDectProtonStoppingPowers(Image, Image, Integer, Double(,))
