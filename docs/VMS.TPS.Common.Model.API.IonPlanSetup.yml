- uid: VMS.TPS.Common.Model.API.IonPlanSetup.CreateDectVerificationPlan(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image)
  commentId: M:VMS.TPS.Common.Model.API.IonPlanSetup.CreateDectVerificationPlan(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image)
  id: CreateDectVerificationPlan(VMS.TPS.Common.Model.API.Image,VMS.TPS.Common.Model.API.Image)
  parent: VMS.TPS.Common.Model.API.IonPlanSetup
  langs:
  - csharp
  - vb
  name: CreateDectVerificationPlan(Image, Image)
  nameWithType: IonPlanSetup.CreateDectVerificationPlan(Image, Image)
  fullName: VMS.TPS.Common.Model.API.IonPlanSetup.CreateDectVerificationPlan(VMS.TPS.Common.Model.API.Image, VMS.TPS.Common.Model.API.Image)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this property depends on your Eclipse Scripting API license] Creates a new proton verification plan that 

    is a copy of this plan and that has dose calculated using the DECT proton stopping power values calculated based on the

    input images "rhoImage" and "zImage".
  example: []
  syntax:
    content: public IonPlanSetup CreateDectVerificationPlan(Image rhoImage, Image zImage)
    parameters:
    - id: rhoImage
      type: VMS.TPS.Common.Model.API.Image
      description: A DECT relative electron density image where the value each voxel is interpreted as rho = 0.001 * (value + 1000).
    - id: zImage
      type: VMS.TPS.Common.Model.API.Image
      description: A DECT effective atomic number image.
    return:
      type: VMS.TPS.Common.Model.API.IonPlanSetup
      description: A verification plan with dose calculated using DECT proton stopping powers.
    content.vb: Public Function CreateDectVerificationPlan(rhoImage As Image, zImage As Image) As IonPlanSetup
  overload: VMS.TPS.Common.Model.API.IonPlanSetup.CreateDectVerificationPlan*
