      type: System.Double
      description: Determines the relative importance of the normal tissue objective in relation to other optimization objectives. The value is positive.
    - id: distanceFromTargetBorderInMM
      type: System.Double
      description: Determines the distance in millimeters from the target border where the evaluation of the normal tissue objective dose begins.
    - id: startDosePercentage
      type: System.Double
      description: >-
        Determines the relative dose level in the normal tissue objective at the target border,
                    expressed in percentage of the upper objective for the target.
