- uid: VMS.TPS.Common.Model.API.OptimizationSetup.AddNormalTissueObjective(System.Double,System.Double,System.Double,System.Double,System.Double)
  commentId: M:VMS.TPS.Common.Model.API.OptimizationSetup.AddNormalTissueObjective(System.Double,System.Double,System.Double,System.Double,System.Double)
  id: AddNormalTissueObjective(System.Double,System.Double,System.Double,System.Double,System.Double)
  parent: VMS.TPS.Common.Model.API.OptimizationSetup
  langs:
  - csharp
  - vb
  name: AddNormalTissueObjective(double, double, double, double, double)
  nameWithType: OptimizationSetup.AddNormalTissueObjective(double, double, double, double, double)
  fullName: VMS.TPS.Common.Model.API.OptimizationSetup.AddNormalTissueObjective(double, double, double, double, double)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Adds a new normal tissue objective (NTO) or updates the data of the existing objective. Only one

    NTO can be added. Calling this function disables the automatic NTO if it has been set previously.
  example: []
  syntax:
    content: public OptimizationNormalTissueParameter AddNormalTissueObjective(double priority, double distanceFromTargetBorderInMM, double startDosePercentage, double endDosePercentage, double fallOff)
    parameters:
    - id: priority
      type: System.Double
      description: Determines the relative importance of the normal tissue objective in relation to other optimization objectives. The value is positive.
    - id: distanceFromTargetBorderInMM
      type: System.Double
      description: Determines the distance in millimeters from the target border where the evaluation of the normal tissue objective dose begins.
    - id: startDosePercentage
      type: System.Double
      description: >-
        Determines the relative dose level in the normal tissue objective at the target border,
                    expressed in percentage of the upper objective for the target.
                    The value is positive. 100% is specified as 100.
