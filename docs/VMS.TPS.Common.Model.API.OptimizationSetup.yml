  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Adds a new normal tissue objective (NTO) for a proton plan or updates the data of the existing objective. Only one

    NTO can be added. Calling this function disables the automatic NTO if it has been set previously.
  example: []
  syntax:
    content: public OptimizationNormalTissueParameter AddProtonNormalTissueObjective(double priority, double distanceFromTargetBorderInMM, double startDosePercentage, double endDosePercentage)
    parameters:
