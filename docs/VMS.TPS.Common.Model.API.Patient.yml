- uid: VMS.TPS.Common.Model.API.Patient.CopyImageFromOtherPatient(System.String,System.String,System.String)
  commentId: M:VMS.TPS.Common.Model.API.Patient.CopyImageFromOtherPatient(System.String,System.String,System.String)
  id: CopyImageFromOtherPatient(System.String,System.String,System.String)
  parent: VMS.TPS.Common.Model.API.Patient
  langs:
  - csharp
  - vb
  name: CopyImageFromOtherPatient(string, string, string)
  nameWithType: Patient.CopyImageFromOtherPatient(string, string, string)
  fullName: VMS.TPS.Common.Model.API.Patient.CopyImageFromOtherPatient(string, string, string)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Copies an image from an other patient to this patient. A new study and series is created for the image.

    The method <xref href="VMS.TPS.Common.Model.API.Patient.CanCopyImageFromOtherPatient(VMS.TPS.Common.Model.API.Study%2cSystem.String%2cSystem.String%2cSystem.String%2cSystem.String%40)?text=CanCopyImageFromOtherPatient" data-throw-if-not-resolved="false"></xref>

    can be used to check if copying the image is possible.
  example: []
  syntax:
    content: public StructureSet CopyImageFromOtherPatient(string otherPatientId, string otherPatientStudyId, string otherPatient3DImageId)
    parameters:
    - id: otherPatientId
      type: System.String
      description: The identifier of the other patient.
    - id: otherPatientStudyId
      type: System.String
      description: The identifier of the other patient's study. If null or empty, the system tries to find the image using only the 3D image identifier.
    - id: otherPatient3DImageId
      type: System.String
      description: The identifier of the other patient's 3D image.
    return:
      type: VMS.TPS.Common.Model.API.StructureSet
      description: The structure set of the copied 3D image.
    content.vb: Public Function CopyImageFromOtherPatient(otherPatientId As String, otherPatientStudyId As String, otherPatient3DImageId As String) As StructureSet
  overload: VMS.TPS.Common.Model.API.Patient.CopyImageFromOtherPatient*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: The exception is thrown if the patient is the current patient, or the patient is not found, or the image is not found.
  nameWithType.vb: Patient.CopyImageFromOtherPatient(String, String, String)
