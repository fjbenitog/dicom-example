- uid: VMS.TPS.Common.Model.API.Patient.AddEmptyPhantom(System.String,VMS.TPS.Common.Model.Types.PatientOrientation,System.Int32,System.Int32,System.Double,System.Double,System.Int32,System.Double)
  commentId: M:VMS.TPS.Common.Model.API.Patient.AddEmptyPhantom(System.String,VMS.TPS.Common.Model.Types.PatientOrientation,System.Int32,System.Int32,System.Double,System.Double,System.Int32,System.Double)
  id: AddEmptyPhantom(System.String,VMS.TPS.Common.Model.Types.PatientOrientation,System.Int32,System.Int32,System.Double,System.Double,System.Int32,System.Double)
  parent: VMS.TPS.Common.Model.API.Patient
  langs:
  - csharp
  - vb
  name: AddEmptyPhantom(string, PatientOrientation, int, int, double, double, int, double)
  nameWithType: Patient.AddEmptyPhantom(string, PatientOrientation, int, int, double, double, int, double)
  fullName: VMS.TPS.Common.Model.API.Patient.AddEmptyPhantom(string, VMS.TPS.Common.Model.Types.PatientOrientation, int, int, double, double, int, double)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Adds an empty phantom image to the patient. The empty image is created in a new study.

    A new structure set is created for the image.
  example: []
  syntax:
    content: public StructureSet AddEmptyPhantom(string imageId, PatientOrientation orientation, int xSizePixel, int ySizePixel, double widthMM, double heightMM, int nrOfPlanes, double planeSepMM)
    parameters:
    - id: imageId
      type: System.String
      description: The identifier for the empty image to be created. The value must not be empty.
    - id: orientation
      type: VMS.TPS.Common.Model.Types.PatientOrientation
      description: The patient orientation in the image.
    - id: xSizePixel
      type: System.Int32
      description: The x size of the image in pixels. The expected value is from 23 to 2048 pixels.
    - id: ySizePixel
      type: System.Int32
      description: The y size of the image in pixels. The expected value is from 23 to 2048 pixels.
    - id: widthMM
      type: System.Double
      description: The height of the image in millimeters. The expected value is from 10.0 to 2000.0 millimeters.
    - id: heightMM
      type: System.Double
      description: The width of the image in millimeters. The expected value is from 10.0 to 2000.0 millimeters.
    - id: nrOfPlanes
      type: System.Int32
      description: The number of planes in the image. The expected value is from 1 to 10000.
    - id: planeSepMM
      type: System.Double
      description: The distance between the planes in millimeters. The expected value is from 0.1 to 200.0 millimeters.
    return:
      type: VMS.TPS.Common.Model.API.StructureSet
      description: The structure set associated with the new empty image.
    content.vb: Public Function AddEmptyPhantom(imageId As String, orientation As PatientOrientation, xSizePixel As Integer, ySizePixel As Integer, widthMM As Double, heightMM As Double, nrOfPlanes As Integer, planeSepMM As Double) As StructureSet
  overload: VMS.TPS.Common.Model.API.Patient.AddEmptyPhantom*
  nameWithType.vb: Patient.AddEmptyPhantom(String, PatientOrientation, Integer, Integer, Double, Double, Integer, Double)
  fullName.vb: VMS.TPS.Common.Model.API.Patient.AddEmptyPhantom(String, VMS.TPS.Common.Model.Types.PatientOrientation, Integer, Integer, Double, Double, Integer, Double)
  name.vb: AddEmptyPhantom(String, PatientOrientation, Integer, Integer, Double, Double, Integer, Double)
