  parent: VMS.TPS.Common.Model.API.PlanSetup
  langs:
  - csharp
  - vb
  name: AddPlanUncertaintyWithParameters(PlanUncertaintyType, bool, double, VVector)
  nameWithType: PlanSetup.AddPlanUncertaintyWithParameters(PlanUncertaintyType, bool, double, VVector)
  fullName: VMS.TPS.Common.Model.API.PlanSetup.AddPlanUncertaintyWithParameters(VMS.TPS.Common.Model.Types.PlanUncertaintyType, bool, double, VMS.TPS.Common.Model.Types.VVector)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Add a new plan or field uncertainty with parameters.

    In case of field specific uncertainty, HUConversionError is overwritten to be always zero.

    Supported uncertainty types: RangeUncertainty, IsocenterShiftUncertainty,

    BaselineShiftUncertainty, RobustOptimizationUncertainty (=Perturbation).

    RangeUncertainty and RobustOptimizationUncertainty are proton specific.

    IsocenterShiftUncertainty and BaselineShiftUncertainty are photon specific.

    Field specific plan uncertainty dose can be used only for RobustOptimizationUncertainty.

    In case of BaselineShiftUncertainty isocenterShift parameter is actually target shift.
  example: []
  syntax:
    content: public PlanUncertainty AddPlanUncertaintyWithParameters(PlanUncertaintyType uncertaintyType, bool planSpecificUncertainty, double HUConversionError, VVector isocenterShift)
    parameters:
    - id: uncertaintyType
      type: VMS.TPS.Common.Model.Types.PlanUncertaintyType
      description: Type of the plan uncertainty dose.
    - id: planSpecificUncertainty
      type: System.Boolean
      description: The plan uncertainty dose is either plan specific (true) or field specific (false).
    - id: HUConversionError
      type: System.Double
      description: Calibration curve error [%]
    - id: isocenterShift
      type: VMS.TPS.Common.Model.Types.VVector
      description: Patient setup error [cm]
    return:
      type: VMS.TPS.Common.Model.API.PlanUncertainty
    content.vb: Public Function AddPlanUncertaintyWithParameters(uncertaintyType As PlanUncertaintyType, planSpecificUncertainty As Boolean, HUConversionError As Double, isocenterShift As VVector) As PlanUncertainty
