  commentId: M:VMS.TPS.Common.Model.API.PlanSetup.AddPlanUncertaintyWithParameters(VMS.TPS.Common.Model.Types.PlanUncertaintyType,System.Boolean,System.Double,VMS.TPS.Common.Model.Types.VVector)
