  commentId: M:VMS.TPS.Common.Model.API.PlanSetup.SetCalculationOption(System.String,System.String,System.String)
  id: SetCalculationOption(System.String,System.String,System.String)
  parent: VMS.TPS.Common.Model.API.PlanSetup
  langs:
  - csharp
  - vb
  name: SetCalculationOption(string, string, string)
  nameWithType: PlanSetup.SetCalculationOption(string, string, string)
  fullName: VMS.TPS.Common.Model.API.PlanSetup.SetCalculationOption(string, string, string)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] Sets the given calculation option to the given value.

    Before setting the options for the model, set the calculation model.

    See <xref href="VMS.TPS.Common.Model.API.PlanSetup.SetCalculationModel(VMS.TPS.Common.Model.Types.CalculationType%2cSystem.String)?text=SetCalculationModel" data-throw-if-not-resolved="false"></xref>.
  remarks: Available options are stored in the schema files of the calculation model located on the Distributed Calculation Framework (DCF) server.
  example: []
  syntax:
    content: public bool SetCalculationOption(string calculationModel, string optionName, string optionValue)
    parameters:
    - id: calculationModel
      type: System.String
      description: The name of the calculation model.
    - id: optionName
      type: System.String
      description: >-
        The XPath or name of the option to set. If this is not an XPath,
                    the method sets the first attribute that matches the name.
                    Example 1:
                    CalculationGridSizeInCM in the Anisotropic Analytical Algorithm (AAA) sets the option /AAACalculationOptions/@CalculationGridSizeInCM.
                    Example 2:
                    MaximalDrillDepthInCM in the Proton Convolution Superposition (PCS) algorithm sets the option /ProtonCalculationOptions/ScatteringUniformScanning/CompensatorConversion/Drilling1/@MaximalDrillDepthInCM.
                    To set the values, for example, for the Drilling2 settings, you have to specify the entire XPath /ProtonCalculationOptions/ScatteringUniformScanning/CompensatorConversion/Drilling2/@MaximalDrillDepthInCM.
    - id: optionValue
      type: System.String
      description: The value to set.
    return:
      type: System.Boolean
      description: Returns false if the method cannot find the given option.
    content.vb: Public Function SetCalculationOption(calculationModel As String, optionName As String, optionValue As String) As Boolean
