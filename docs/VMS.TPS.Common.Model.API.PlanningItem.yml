  namespace: VMS.TPS.Common.Model.API
  summary: Returns cumulative Dose Volume Histogram (DVH) data.
  example: []
  syntax:
    content: public DVHData GetDVHCumulativeData(Structure structure, DoseValuePresentation dosePresentation, VolumePresentation volumePresentation, double binWidth)
    parameters:
    - id: structure
      type: VMS.TPS.Common.Model.API.Structure
      description: Structure for which the DVH data is requested.
    - id: dosePresentation
      type: VMS.TPS.Common.Model.Types.DoseValuePresentation
      description: >-
        Requested dose presentation mode (absolute or relative). Note, that only
                    absolute dose is supported for PlanSums.
    - id: volumePresentation
      type: VMS.TPS.Common.Model.Types.VolumePresentation
      description: Requested volume presentation mode.
    - id: binWidth
      type: System.Double
      description: Requested width of the bin.
    return:
      type: VMS.TPS.Common.Model.API.DVHData
      description: DVHData object that contains the requested DVH information or null if DVH calculation was not possible.
