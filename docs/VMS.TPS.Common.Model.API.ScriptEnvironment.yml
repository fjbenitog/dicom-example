  nameWithType: ScriptEnvironment.ExecuteScript(Assembly, ScriptContext, Window)
  fullName: VMS.TPS.Common.Model.API.ScriptEnvironment.ExecuteScript(System.Reflection.Assembly, VMS.TPS.Common.Model.API.ScriptContext, System.Windows.Window)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Executes an other script from script. This allows a script to be used for launching other scripts.

    Without using this special method, the system would be unaware of the other script, and thus could not save the correct script logs.
  example: []
  syntax:
    content: public void ExecuteScript(Assembly scriptAssembly, ScriptContext scriptContext, Window window)
    parameters:
    - id: scriptAssembly
      type: System.Reflection.Assembly
      description: The other script assembly. The assembly must have a location.
    - id: scriptContext
      type: VMS.TPS.Common.Model.API.ScriptContext
      description: The script context that was passed to the executing script.
    - id: window
      type: System.Windows.Window
      description: The script window. This is an optional parameter, can be null.
    content.vb: Public Sub ExecuteScript(scriptAssembly As Assembly, scriptContext As ScriptContext, window As Window)
  overload: VMS.TPS.Common.Model.API.ScriptEnvironment.ExecuteScript*
