  parent: VMS.TPS.Common.Model.API.StructureSet
  langs:
  - csharp
  - vb
  name: AddCouchStructures(string, PatientOrientation, RailPosition, RailPosition, double?, double?, double?, out IReadOnlyList<Structure>, out bool, out string)
  nameWithType: StructureSet.AddCouchStructures(string, PatientOrientation, RailPosition, RailPosition, double?, double?, double?, out IReadOnlyList<Structure>, out bool, out string)
  fullName: VMS.TPS.Common.Model.API.StructureSet.AddCouchStructures(string, VMS.TPS.Common.Model.Types.PatientOrientation, VMS.TPS.Common.Model.Types.RailPosition, VMS.TPS.Common.Model.Types.RailPosition, double?, double?, double?, out System.Collections.Generic.IReadOnlyList<VMS.TPS.Common.Model.API.Structure>, out bool, out string)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license] 

    Adds couch structures to the StructureSet.

    Eclipse can model certain couches for photon treatment planning. A couch is 

    modeled as a set of couch structures.The couch panel surface and interior, movable

    structural rails and grid(for Unipanel only) are each modeled as separate couch

    structures.

    The structure code of a couch structure is Support by default. You can change it to

    another structure code if necessary.

    The volume type of a couch structure is always Support. Couch structures are

    modeled inside a 3D image. If the 3D image is too small, this method will always enlarge the

    image to fit the couch structures.
  example: []
  syntax:
    content: public bool AddCouchStructures(string couchModel, PatientOrientation orientation, RailPosition railA, RailPosition railB, double? surfaceHU, double? interiorHU, double? railHU, out IReadOnlyList<Structure> addedStructures, out bool imageResized, out string error)
    parameters:
    - id: couchModel
      type: System.String
      description: The id of the couch profile configured in Eclipse to use when creating the couch structures.
    - id: orientation
      type: VMS.TPS.Common.Model.Types.PatientOrientation
      description: >-
        Patient orientation specifying where the couch structures are added.
                    Pass NoOrientation to take the orientation from the image.
    - id: railA
      type: VMS.TPS.Common.Model.Types.RailPosition
      description: Position of moveable rail A.
    - id: railB
      type: VMS.TPS.Common.Model.Types.RailPosition
      description: Position of moveable rail B.
    - id: surfaceHU
      type: System.Nullable{System.Double}
      description: >-
        HU value of the modeled couch surface.
                    Pass null to use the setting from the specified couch profile or override by passing another value.
    - id: interiorHU
      type: System.Nullable{System.Double}
      description: >-
        HU value of the modeled couch interior.
                    Pass null to use the setting from the specified couch profile or override by passing another value.
    - id: railHU
      type: System.Nullable{System.Double}
      description: >-
        HU value of the modeled couch rails.
                    Pass null to use the setting from the specified couch profile or override by passing another value.
    - id: addedStructures
      type: System.Collections.Generic.IReadOnlyList{VMS.TPS.Common.Model.API.Structure}
      description: Returned list of added couch structures if successful.
    - id: imageResized
      type: System.Boolean
      description: True if image was resized.
    - id: error
      type: System.String
      description: Returned error message if call failed.
    return:
      type: System.Boolean
      description: True if couch structures added.
    content.vb: Public Function AddCouchStructures(couchModel As String, orientation As PatientOrientation, railA As RailPosition, railB As RailPosition, surfaceHU As Double?, interiorHU As Double?, railHU As Double?, addedStructures As IReadOnlyList(Of [Structure]), imageResized As Boolean, [error] As String) As Boolean
  overload: VMS.TPS.Common.Model.API.StructureSet.AddCouchStructures*
  nameWithType.vb: StructureSet.AddCouchStructures(String, PatientOrientation, RailPosition, RailPosition, Double?, Double?, Double?, IReadOnlyList(Of Structure), Boolean, String)
  fullName.vb: VMS.TPS.Common.Model.API.StructureSet.AddCouchStructures(String, VMS.TPS.Common.Model.Types.PatientOrientation, VMS.TPS.Common.Model.Types.RailPosition, VMS.TPS.Common.Model.Types.RailPosition, Double?, Double?, Double?, System.Collections.Generic.IReadOnlyList(Of VMS.TPS.Common.Model.API.Structure), Boolean, String)
