    The range of the objective may be limited because one or more objective has a restrictor (<xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveUpperRestrictor(VMS.TPS.Common.Model.API.TradeoffObjective%2cSystem.Double)" data-throw-if-not-resolved="false"></xref>) set.

    If <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> is false, <xref href="System.Double.NaN" data-throw-if-not-resolved="false"></xref> is returned as the cost.
  example: []
  syntax:
    content: public double GetObjectiveLowerLimit(TradeoffObjective objective)
    parameters:
    - id: objective
      type: VMS.TPS.Common.Model.API.TradeoffObjective
      description: Trade-off objective for which to get the lower limit.
    return:
      type: System.Double
      description: Lower limit [0,1] of the given trade-off objective
    content.vb: Public Function GetObjectiveLowerLimit(objective As TradeoffObjective) As Double
