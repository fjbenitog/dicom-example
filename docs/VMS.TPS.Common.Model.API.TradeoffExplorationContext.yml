  langs:
  - csharp
  - vb
  name: TradeoffExplorationContext
  nameWithType: TradeoffExplorationContext
  fullName: VMS.TPS.Common.Model.API.TradeoffExplorationContext
  type: Class
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: <p>Context for performing multi-criteria optimization (MCO) to explore different trade-offs.</p>
  remarks: To be able to get the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext" data-throw-if-not-resolved="false"></xref> class from <xref href="VMS.TPS.Common.Model.API.ExternalPlanSetup" data-throw-if-not-resolved="false"></xref>, the plan needs to have the optimization objectives set.
  example:
  - >-
    <p>The basic workflow is the following:</p>

    <p><strong></strong></p><ol><li>Start from an optimized and calculated plan by using the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext" data-throw-if-not-resolved="false"></xref> class.</li><li>Select the trade-off objectives by using the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.AddTradeoffObjective(VMS.TPS.Common.Model.API.Structure)" data-throw-if-not-resolved="false"></xref> method. At least one objective is needed.</li><li>Query if all pre-conditions to generate the plan collection are met by calling the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.CanCreatePlanCollection" data-throw-if-not-resolved="false"></xref> property.</li><li>If <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.CanCreatePlanCollection" data-throw-if-not-resolved="false"></xref> is true, generate the plan collection by calling the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection(System.Boolean%2cVMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> method.</li><li>If the plan collection is generated successfully, the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> property is set to true. The class is now ready for exploring different trade-offs.</li><li>To evaluate the current trade-off, use the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.GetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective)" data-throw-if-not-resolved="false"></xref>, <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.CurrentDose" data-throw-if-not-resolved="false"></xref>, and <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.GetStructureDvh(VMS.TPS.Common.Model.API.Structure)" data-throw-if-not-resolved="false"></xref> methods.</li><li>To explore different trade-offs, use the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective%2cSystem.Double)" data-throw-if-not-resolved="false"></xref> method to reduce the cost of any objective and use the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveUpperRestrictor(VMS.TPS.Common.Model.API.TradeoffObjective%2cSystem.Double)" data-throw-if-not-resolved="false"></xref> method to prevent the cost of an objective from exceeding a specified limit.</li><li>Save the trade-off exploration results by calling the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.ApplyTradeoffExplorationResult" data-throw-if-not-resolved="false"></xref> method. The method also applies the trade-off exploration result to the plan setup for IMRT plans.</li><li>In case of a VMAT plan, call the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreateDeliverableVmatPlan(System.Boolean)" data-throw-if-not-resolved="false"></xref> method to apply the trade-off exploration result to the plan setup.</li><li>To resume the trade-off exploration from a saved plan collection, call the <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.LoadSavedPlanCollection" data-throw-if-not-resolved="false"></xref> method.</li></ol>
  syntax:
    content: public class TradeoffExplorationContext
    content.vb: Public Class TradeoffExplorationContext
