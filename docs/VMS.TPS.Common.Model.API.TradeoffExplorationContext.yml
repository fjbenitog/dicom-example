- uid: VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection(System.Boolean,VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode,System.Boolean)
  commentId: M:VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection(System.Boolean,VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode,System.Boolean)
  id: CreatePlanCollection(System.Boolean,VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode,System.Boolean)
  parent: VMS.TPS.Common.Model.API.TradeoffExplorationContext
  langs:
  - csharp
  - vb
  name: CreatePlanCollection(bool, TradeoffPlanGenerationIntermediateDoseMode, bool)
  nameWithType: TradeoffExplorationContext.CreatePlanCollection(bool, TradeoffPlanGenerationIntermediateDoseMode, bool)
  fullName: VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection(bool, VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode, bool)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license]

    Creates a plan collection for trade-off exploration and sets <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> to true.

    Note: This operation is a long-running task because it involves optimizing a set of Pareto plans.
  example: []
  syntax:
    content: public bool CreatePlanCollection(bool continueOptimization, TradeoffPlanGenerationIntermediateDoseMode intermediateDoseMode, bool useHybridOptimizationForVmat = false)
    parameters:
    - id: continueOptimization
      type: System.Boolean
      description: >-
        True if the starting point for the trade-off exploration should be created by continuing optimization

        for the existing plan. Otherwise, the starting point is created by starting optimization from the beginning.
    - id: intermediateDoseMode
      type: VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode
      description: Specifies which intermediate dose mode is used for plan generation.
    - id: useHybridOptimizationForVmat
      type: System.Boolean
      description: >-
        True if VMAT-IMRT hybrid optimization should be used in VMAT plan generation. 

        Otherwise native VMAT optimization is used.
    return:
      type: System.Boolean
      description: True if plan collection was successfully created.
    content.vb: Public Function CreatePlanCollection(continueOptimization As Boolean, intermediateDoseMode As TradeoffPlanGenerationIntermediateDoseMode, useHybridOptimizationForVmat As Boolean = False) As Boolean
  overload: VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection*
  nameWithType.vb: TradeoffExplorationContext.CreatePlanCollection(Boolean, TradeoffPlanGenerationIntermediateDoseMode, Boolean)
  fullName.vb: VMS.TPS.Common.Model.API.TradeoffExplorationContext.CreatePlanCollection(Boolean, VMS.TPS.Common.Model.API.TradeoffPlanGenerationIntermediateDoseMode, Boolean)
  name.vb: CreatePlanCollection(Boolean, TradeoffPlanGenerationIntermediateDoseMode, Boolean)
