- uid: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective,System.Double)
  commentId: M:VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective,System.Double)
  id: SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective,System.Double)
  parent: VMS.TPS.Common.Model.API.TradeoffExplorationContext
  langs:
  - csharp
  - vb
  name: SetObjectiveCost(TradeoffObjective, double)
  nameWithType: TradeoffExplorationContext.SetObjectiveCost(TradeoffObjective, double)
  fullName: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective, double)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    [Availability of this method depends on your Eclipse Scripting API license]

    A single trade-off objective specifies a one dimensional subspace of the Pareto surface.

    By adjusting the relative cost of the objective, it is possible to move in this one dimensional subspace.

    The difference between the current relative cost

    and the new relative cost specifies the direction of the movement. If the difference is negative, the movement is towards the extreme case where the given

    trade-off objective is emphasized at the cost of all other objectives. If the difference is positive, the movement is away from the extreme case.

    If <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> is false, the call to <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective%2cSystem.Double)" data-throw-if-not-resolved="false"></xref> is ignored.
  example: []
  syntax:
    content: public void SetObjectiveCost(TradeoffObjective tradeoffObjective, double cost)
    parameters:
    - id: tradeoffObjective
      type: VMS.TPS.Common.Model.API.TradeoffObjective
      description: Trade-off objective that specifies the one dimensional subspace.
    - id: cost
      type: System.Double
      description: The relative cost is defined as an interval [0,1]. A smaller value gives more emphasis to the given trade-off objective.
    content.vb: Public Sub SetObjectiveCost(tradeoffObjective As TradeoffObjective, cost As Double)
  overload: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost*
  nameWithType.vb: TradeoffExplorationContext.SetObjectiveCost(TradeoffObjective, Double)
  fullName.vb: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveCost(VMS.TPS.Common.Model.API.TradeoffObjective, Double)
  name.vb: SetObjectiveCost(TradeoffObjective, Double)
