  syntax:
    content: public double GetObjectiveCost(TradeoffObjective objective)
    parameters:
    - id: objective
      type: VMS.TPS.Common.Model.API.TradeoffObjective
      description: Trade-off objective for which to get the cost.
    return:
      type: System.Double
      description: Current relative cost [0,1] of the given trade-off objective.
    content.vb: Public Function GetObjectiveCost(objective As TradeoffObjective) As Double
  overload: VMS.TPS.Common.Model.API.TradeoffExplorationContext.GetObjectiveCost*
- uid: VMS.TPS.Common.Model.API.TradeoffExplorationContext.GetObjectiveLowerLimit(VMS.TPS.Common.Model.API.TradeoffObjective)
