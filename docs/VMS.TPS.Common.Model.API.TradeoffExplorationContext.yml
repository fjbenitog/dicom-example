  nameWithType: TradeoffExplorationContext.SetObjectiveUpperRestrictor(TradeoffObjective, double)
  fullName: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveUpperRestrictor(VMS.TPS.Common.Model.API.TradeoffObjective, double)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.API
  namespace: VMS.TPS.Common.Model.API
  summary: >-
    Sets an upper limit for a trade-off objective. The limits are normalized to the range [0,1].

    If <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> is false, the call to <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveUpperRestrictor(VMS.TPS.Common.Model.API.TradeoffObjective%2cSystem.Double)" data-throw-if-not-resolved="false"></xref> is ignored.
  example: []
  syntax:
    content: public void SetObjectiveUpperRestrictor(TradeoffObjective tradeoffObjective, double restrictorValue)
    parameters:
    - id: tradeoffObjective
      type: VMS.TPS.Common.Model.API.TradeoffObjective
      description: Optimization objective selected for trade-off exploration. This trade-off objective specifies the one dimensional subspace of the Pareto surface.
    - id: restrictorValue
      type: System.Double
      description: New upper limit [0,1] of the given trade-off objective.
    content.vb: Public Sub SetObjectiveUpperRestrictor(tradeoffObjective As TradeoffObjective, restrictorValue As Double)
  overload: VMS.TPS.Common.Model.API.TradeoffExplorationContext.SetObjectiveUpperRestrictor*
