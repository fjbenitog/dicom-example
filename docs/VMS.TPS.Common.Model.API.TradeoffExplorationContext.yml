    If <xref href="VMS.TPS.Common.Model.API.TradeoffExplorationContext.HasPlanCollection" data-throw-if-not-resolved="false"></xref> is false, <xref href="System.Double.NaN" data-throw-if-not-resolved="false"></xref> is returned as the cost.
