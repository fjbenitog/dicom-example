- uid: VMS.TPS.Common.Model.Types.Fluence.#ctor(System.Single[0:,0:],System.Double,System.Double)
  commentId: M:VMS.TPS.Common.Model.Types.Fluence.#ctor(System.Single[0:,0:],System.Double,System.Double)
  id: '#ctor(System.Single[0:,0:],System.Double,System.Double)'
  parent: VMS.TPS.Common.Model.Types.Fluence
  langs:
  - csharp
  - vb
  name: Fluence(float[,], double, double)
  nameWithType: Fluence.Fluence(float[,], double, double)
  fullName: VMS.TPS.Common.Model.Types.Fluence.Fluence(float[,], double, double)
  type: Constructor
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: Constructor.
  example: []
  syntax:
    content: public Fluence(float[,] fluenceMatrix, double xOrigin, double yOrigin)
    parameters:
    - id: fluenceMatrix
      type: System.Single[,]
      description: >-
        Contains the pixel values for the fluence.
                    x dimension is the number of columns, and y dimension is the number of rows in the matrix.
                    The minimum number of rows and columns is 2, and the maximum is 1024.
                    For the optimal fluence of a beam, the values in the fluence matrix are floats, 4 bytes per pixel.
                    The pixel values are determined as follows: fluence value 1 produces a dose of 1 Gy at the depth of 10 cm in a water phantom with a 10 x 10 cm open field. 
                    Correspondingly, fluence value 2 produces 2 Gy, fluence value 3 produces 3 Gy, etc. at the depth of 10 cm in a water phantom with a 10 x 10 cm open field.
                    Pixel values are positive.
    - id: xOrigin
      type: System.Double
      description: >-
        The x coordinate of the first pixel in a fluence map. 
                    The value is measured in millimeters from the field isocenter to the center of the first pixel. 
                    The coordinate axes are the same as in the IEC BEAM LIMITING DEVICE coordinate system.
    - id: yOrigin
      type: System.Double
      description: >-
        The y coordinate of the first pixel in a fluence map. 
                    The value is measured in millimeters from the field isocenter to the center of the first pixel.
                    The coordinate axes are the same as in the IEC BEAM LIMITING DEVICE coordinate system.
    content.vb: Public Sub New(fluenceMatrix As Single(,), xOrigin As Double, yOrigin As Double)
  overload: VMS.TPS.Common.Model.Types.Fluence.#ctor*
