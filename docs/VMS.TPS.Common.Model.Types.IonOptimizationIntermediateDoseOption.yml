  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: Calculate intermediate dose after optimization has either converged or reached the maximum number of iterations. After intermediate dose has been applied, optimization continues until convergence or until the maximum number of iterations is reached.
  example: []
  syntax:
    content: AutomaticIntermediateDose = 1
    return:
      type: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
