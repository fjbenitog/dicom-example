  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: Apply field doses as intermediate dose in the optimization. The optimization continues until convergence or until the maximum number of iterations is reached.
  example: []
  syntax:
    content: FieldDosesAsIntermediateDose = 4
    return:
      type: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
