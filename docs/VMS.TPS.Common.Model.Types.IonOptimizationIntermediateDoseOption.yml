  fullName: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption.ApplyIntermediateDoseAfterNIterations
  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: Calculate intermediate dose after optimization has reached a user-specified number of iterations. After intermediate dose has been applied, optimization continues until convergence or until the maximum number of iterations is reached.
  example: []
  syntax:
    content: ApplyIntermediateDoseAfterNIterations = 2
    return:
      type: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
- uid: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption.PeriodicIntermediateDoseEveryNIterations
  commentId: F:VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption.PeriodicIntermediateDoseEveryNIterations
  id: PeriodicIntermediateDoseEveryNIterations
  parent: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
  langs:
  - csharp
  - vb
  name: PeriodicIntermediateDoseEveryNIterations
  nameWithType: IonOptimizationIntermediateDoseOption.PeriodicIntermediateDoseEveryNIterations
  fullName: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption.PeriodicIntermediateDoseEveryNIterations
  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Calculate intermediate dose multiple times, repeating the calculation after a user-specified number of iterations. The last optimization round is triggered when the next set of user-specified number of iterations would exceed the maximum number of iterations.

    In the last optimization round, optimization continues until convergence or until the maximum number of iterations is reached.
  example: []
  syntax:
    content: PeriodicIntermediateDoseEveryNIterations = 3
    return:
      type: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
