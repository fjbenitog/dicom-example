  type: Constructor
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Plan normalization parameters for user-defined target volume percentage and plan normalization value.

    For more information refer to the plan normalization options in the Eclipse Proton Reference Guide.
  remarks: >-
    Provide <code>normalizationValue</code> and <code>volumePercentage</code> if <code>normalizationMode</code> is <code>PlanNormalizationMode.TargetDVH</code>.

    <code>normalizationValue</code> and <code>volumePercentage</code> will be set to <code>NaN</code> if the <code>normalizationMode</code> is not <code>PlanNormalizationMode.TargetDVH</code>.
  example: []
  syntax:
    content: public IonPlanNormalizationParameters(PlanNormalizationMode normalizationMode, double normalizationValue, double volumePercentage)
    parameters:
    - id: normalizationMode
      type: VMS.TPS.Common.Model.Types.PlanNormalizationMode
      description: ''
    - id: normalizationValue
      type: System.Double
      description: ''
    - id: volumePercentage
      type: System.Double
      description: ''
    content.vb: Public Sub New(normalizationMode As PlanNormalizationMode, normalizationValue As Double, volumePercentage As Double)
  overload: VMS.TPS.Common.Model.Types.IonPlanNormalizationParameters.#ctor*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: An exception is thrown if either the <code>normalizationValue</code> and/or <code>volumePercentage</code> are invalid, or the <code>normalizationMode</code> is not <code>PlanNormalizationMode.TargetDVH</code>.
