  nameWithType: OptimizationOptionsIMPT.OptimizationOptionsIMPT(int, OptimizationOption, IonOptimizationIntermediateDoseOption, int)
  fullName: VMS.TPS.Common.Model.Types.OptimizationOptionsIMPT.OptimizationOptionsIMPT(int, VMS.TPS.Common.Model.Types.OptimizationOption, VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption, int)
  type: Constructor
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Constructor for setting proton optimization options for optimizing with intermediate dose.

    Initial state defines whether proton optimization uses an existing scan list or starts from zero. 

    Intermediate dose option defines whether optimizer gets to converge before intermediate dose calculation or whether it runs for a user-specified number of iterations.

    Also having multiple intermediate dose calculation rounds or using existing field dose as intermediate dose is possible.

    Regardless of the intermediate dose option, the final optimization round runs until convergence or until a maximum number of iterations is reached.
  example: []
  syntax:
    content: public OptimizationOptionsIMPT(int maxIterations, OptimizationOption initialState, IonOptimizationIntermediateDoseOption intermediateDoseOption, int numberOfIterationsBeforeIDose = 0)
    parameters:
    - id: maxIterations
      type: System.Int32
      description: Maximum number of iterations for optimization.
    - id: initialState
      type: VMS.TPS.Common.Model.Types.OptimizationOption
      description: Initial state at the beginning of optimization.
    - id: intermediateDoseOption
      type: VMS.TPS.Common.Model.Types.IonOptimizationIntermediateDoseOption
      description: Used option for calculating and applying intermediate dose.
    - id: numberOfIterationsBeforeIDose
      type: System.Int32
      description: Number of steps before the intermediate dose is calculated.
    content.vb: Public Sub New(maxIterations As Integer, initialState As OptimizationOption, intermediateDoseOption As IonOptimizationIntermediateDoseOption, numberOfIterationsBeforeIDose As Integer = 0)
  overload: VMS.TPS.Common.Model.Types.OptimizationOptionsIMPT.#ctor*
