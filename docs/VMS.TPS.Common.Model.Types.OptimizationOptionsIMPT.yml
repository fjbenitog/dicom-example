  summary: >-
    Constructor for setting proton optimization options.

    Initial state defines whether proton optimization uses an existing scan list or starts from zero. 

    The optimization continues until convergence or until a maximum number of iterations is reached. 

    Intermediate dose is not used in the optimization.
