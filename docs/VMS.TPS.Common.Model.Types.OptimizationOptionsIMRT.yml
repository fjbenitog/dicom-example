  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Specify the initial state at the beginning of optimization and use intermediate dose after a specified number of iterations. The user specifies if 

    the calculation terminates upon convergence before the maximum number of iterations is reached. If the intermediate dose is selected, the intermediate dose is calculated 

    once after which the optimization is restarted. This option is the same as the "Automatic Intermediate Dose" option in External Beam Planning.
  example: []
  syntax:
    content: public OptimizationOptionsIMRT(int maxIterations, OptimizationOption initialState, OptimizationConvergenceOption convergenceOption, OptimizationIntermediateDoseOption intermediateDoseOption, string mlcId)
    parameters:
    - id: maxIterations
      type: System.Int32
      description: Maximum number of iterations for IMRT optimization.
    - id: initialState
      type: VMS.TPS.Common.Model.Types.OptimizationOption
      description: Initial state at the beginning of optimization.
    - id: convergenceOption
      type: VMS.TPS.Common.Model.Types.OptimizationConvergenceOption
      description: Option to terminate optimization early if the iteration is converged.
    - id: intermediateDoseOption
      type: VMS.TPS.Common.Model.Types.OptimizationIntermediateDoseOption
      description: Specify if intermediate dose is calculated.
    - id: mlcId
      type: System.String
      description: Identifier for the Multileaf Collimator (MLC).
    content.vb: Public Sub New(maxIterations As Integer, initialState As OptimizationOption, convergenceOption As OptimizationConvergenceOption, intermediateDoseOption As OptimizationIntermediateDoseOption, mlcId As String)
