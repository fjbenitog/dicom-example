  fullName: VMS.TPS.Common.Model.Types.OptimizationOptionsIMRT.OptimizationOptionsIMRT(int, VMS.TPS.Common.Model.Types.OptimizationOption, int, VMS.TPS.Common.Model.Types.OptimizationConvergenceOption, string)
  type: Constructor
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Specify the initial state at the beginning of optimization and use intermediate dose after a specified number of iterations. The user specifies if 

    the calculation terminates upon convergence before the maximum number of iterations is reached. If the intermediate dose is selected, the intermediate dose is calculated 

    at least once. The subsequent cycles may be terminated early if the iteration has been converged.
  example: []
  syntax:
    content: public OptimizationOptionsIMRT(int maxIterations, OptimizationOption initialState, int numberOfStepsBeforeIntermediateDose, OptimizationConvergenceOption convergenceOption, string mlcId)
    parameters:
    - id: maxIterations
      type: System.Int32
      description: Maximum number of iterations for IMRT optimization.
    - id: initialState
      type: VMS.TPS.Common.Model.Types.OptimizationOption
      description: Initial state at the beginning of optimization.
    - id: numberOfStepsBeforeIntermediateDose
      type: System.Int32
      description: Number of steps before the intermediate dose is calculated.
    - id: convergenceOption
      type: VMS.TPS.Common.Model.Types.OptimizationConvergenceOption
      description: Option to terminate optimization early if the iteration is converged.
    - id: mlcId
      type: System.String
      description: Identifier for the Multileaf Collimator (MLC).
    content.vb: Public Sub New(maxIterations As Integer, initialState As OptimizationOption, numberOfStepsBeforeIntermediateDose As Integer, convergenceOption As OptimizationConvergenceOption, mlcId As String)
