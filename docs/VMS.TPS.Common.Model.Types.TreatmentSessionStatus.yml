  nameWithType: TreatmentSessionStatus.InActiveTreat
  fullName: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.InActiveTreat
  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    There is no clinical decision yet on whether the plan should be treated or not.

    The <xref href="VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Treat" data-throw-if-not-resolved="false"></xref> status was active before the status was set to InActiveTreat.
  example: []
  syntax:
    content: InActiveTreat = 5
    return:
      type: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
