- uid: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.InActiveTreat
  commentId: F:VMS.TPS.Common.Model.Types.TreatmentSessionStatus.InActiveTreat
  id: InActiveTreat
  parent: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
  langs:
  - csharp
