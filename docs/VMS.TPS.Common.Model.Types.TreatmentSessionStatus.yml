- uid: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Treat
  commentId: F:VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Treat
  id: Treat
  parent: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
  langs:
  - csharp
  - vb
  name: Treat
  nameWithType: TreatmentSessionStatus.Treat
  fullName: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Treat
  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    The plan in this session is to be treated as a complete fraction.

    When treating a plan based on this status, the fraction number shall be incremented by 1.

    In case of a previous partial treatment, the next session shall

    treat the plan completely. Typically, further treatments have to be treated completely as well.
  example: []
  syntax:
    content: Treat = 1
    return:
      type: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
- uid: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Resume
  commentId: F:VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Resume
  id: Resume
  parent: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
  langs:
  - csharp
  - vb
  name: Resume
  nameWithType: TreatmentSessionStatus.Resume
  fullName: VMS.TPS.Common.Model.Types.TreatmentSessionStatus.Resume
  type: Field
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    The plan in this session shall complete a partial treatment of the last incomplete fraction.

    When treating a plan based on this status, the fraction number remains the one of the last treatment.

    Any previously applied dose for the current fraction is taken into account and the user can complete the treatment.
  example: []
  syntax:
    content: Resume = 2
    return:
      type: VMS.TPS.Common.Model.Types.TreatmentSessionStatus
