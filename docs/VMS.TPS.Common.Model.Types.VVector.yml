  type: Method
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Equality comparison of VVector and Object.

    This method considers two instances of VVector.Undefined to be equal to each other.

    Otherwise, a vector is equal to an object only if the object is a VVector and vectors are equal.

    For epsilon-equal comparison, use <xref href="VMS.TPS.Common.Model.Types.VVector.EpsilonEqual(VMS.TPS.Common.Model.Types.VVector%2cSystem.Double)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public override bool Equals(object obj)
    parameters:
    - id: obj
      type: System.Object
      description: Object to compare this to.
    return:
      type: System.Boolean
      description: True if the Object is also VVector and equal to this (vectors are equal), false otherwise.
    content.vb: Public Overrides Function Equals(obj As Object) As Boolean
  overridden: System.ValueType.Equals(System.Object)
  overload: VMS.TPS.Common.Model.Types.VVector.Equals*
  nameWithType.vb: VVector.Equals(Object)
  fullName.vb: VMS.TPS.Common.Model.Types.VVector.Equals(Object)
  name.vb: Equals(Object)
- uid: VMS.TPS.Common.Model.Types.VVector.Equals(VMS.TPS.Common.Model.Types.VVector)
  commentId: M:VMS.TPS.Common.Model.Types.VVector.Equals(VMS.TPS.Common.Model.Types.VVector)
  id: Equals(VMS.TPS.Common.Model.Types.VVector)
  parent: VMS.TPS.Common.Model.Types.VVector
  langs:
  - csharp
  - vb
  name: Equals(VVector)
  nameWithType: VVector.Equals(VVector)
  fullName: VMS.TPS.Common.Model.Types.VVector.Equals(VMS.TPS.Common.Model.Types.VVector)
  type: Method
  assemblies:
  - VMS.TPS.Common.Model.Types
  namespace: VMS.TPS.Common.Model.Types
  summary: >-
    Equality comparison of vectors.

    This method considers two instances of VVector.Undefined to be equal to each other.

    Otherwise, two vectors are equal only if the vectors components are equal.

    a == b, b == c, =&gt; a has to be equal to c. Epsilon equality comparison does not fulfill this condition with epsilon &gt; 0.0.

    For epsilon-equal comparison, use <xref href="VMS.TPS.Common.Model.Types.VVector.EpsilonEqual(VMS.TPS.Common.Model.Types.VVector%2cSystem.Double)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public bool Equals(VVector other)
    parameters:
    - id: other
      type: VMS.TPS.Common.Model.Types.VVector
      description: vector to compare this to.
    return:
